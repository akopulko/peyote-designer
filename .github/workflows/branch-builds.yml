name: Branch Builds

on:
  push:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build macOS app
        run: |
          make build-macos
      - name: Package macOS DMG
        run: |
          sh ./scripts/package_macos_dmg.sh
      - uses: actions/upload-artifact@v6
        with:
          name: peyote-designer-macos-arm64.dmg
          path: dist/peyote-designer-macos-arm64.dmg

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            setup-go-arch: x64
            cc: gcc
            cxx: g++
            cgo-cflags: ""
            cgo-ldflags: ""
            runner: windows-latest
          - arch: arm64
            setup-go-arch: arm64
            cc: clang
            cxx: clang++
            cgo-cflags: -DWINBOOL=BOOL
            cgo-ldflags: -luser32 -lshell32 -ldwmapi
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          architecture: ${{ matrix.setup-go-arch }}
      - name: Build Windows binary
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CGO_CFLAGS: ${{ matrix.cgo-cflags }}
          CGO_LDFLAGS: ${{ matrix.cgo-ldflags }}
        run: |
          mkdir -p dist
          go build -ldflags "-H windowsgui" -o dist/peyote-designer-windows-${{ matrix.arch }}.exe ./cmd/peyote-designer
      - name: Package Windows ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/peyote-designer-windows-${{ matrix.arch }}.exe -DestinationPath dist/peyote-designer-windows-${{ matrix.arch }}.zip
      - uses: actions/upload-artifact@v6
        with:
          name: peyote-designer-windows-${{ matrix.arch }}.zip
          path: dist/peyote-designer-windows-${{ matrix.arch }}.zip
