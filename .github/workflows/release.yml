name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Resolve build metadata
        shell: bash
        run: |
          echo "VERSION=$(sh ./scripts/normalize_version.sh "${GITHUB_REF_NAME}")" >> "$GITHUB_ENV"
          echo "COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build macOS app
        run: |
          make build-macos VERSION="${VERSION}" COMMIT="${COMMIT}" BUILD_DATE="${BUILD_DATE}"
      - name: Package macOS DMG
        run: |
          sh ./scripts/package_macos_dmg.sh
      - uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: dist/peyote-designer-macos-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Resolve build metadata
        shell: bash
        run: |
          echo "VERSION=$(sh ./scripts/normalize_version.sh "${GITHUB_REF_NAME}")" >> "$GITHUB_ENV"
          echo "COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Build Windows binary
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags "-H windowsgui -X github.com/kostya/peyote-designer/internal/buildinfo.Version=${VERSION} -X github.com/kostya/peyote-designer/internal/buildinfo.Commit=${COMMIT} -X github.com/kostya/peyote-designer/internal/buildinfo.BuildDate=${BUILD_DATE}" -o dist/peyote-designer-windows-amd64.exe ./cmd/peyote-designer
      - name: Archive Windows build
        shell: pwsh
        run: Compress-Archive -Path dist/peyote-designer-windows-amd64.exe -DestinationPath dist/peyote-designer-windows-amd64.zip
      - uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: dist/peyote-designer-windows-amd64.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/release-macos/peyote-designer-macos-arm64.dmg
            release-assets/release-windows/peyote-designer-windows-amd64.zip
